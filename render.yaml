services:
  - type: web
    name: aryan-tech-zone
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aryantechzone-db
          property: connectionString
      - key: EMAIL_USER
        value: aryankumar112211225@gmail.com
      - key: ADMIN_EMAIL
        value: aryankumar112211225@gmail.com
      - key: UPI_ID
        value: aryankumar112211225-1@okhdfcbank
      - key: EMAIL_PASS
        sync: false
      - key: BASE_URL
        sync: false
      - key: APPROVE_SECRET
        generateValue: true
    healthCheckPath: /api/health

databases:
  - name: aryantechzone-db
    plan: free
    databaseName: aryantechzone
    user: aryantechzone
